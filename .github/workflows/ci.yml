name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check app/ tests/

      - name: Check formatting with ruff
        run: ruff format --check app/ tests/

  backend-test:
    runs-on: ubuntu-latest
    needs: backend-lint
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: docassist
          POSTGRES_PASSWORD: docassist
          POSTGRES_DB: docassist
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg://docassist:docassist@localhost:5432/docassist
      DB_TEST_HOST: localhost
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=50

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Check formatting with prettier
        run: cd frontend && npx prettier --check "src/**/*.{js,vue,css}"

      - name: Build frontend
        run: cd frontend && npm run build

  docker:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -t docassist-backend backend/

      - name: Build frontend Docker image
        run: docker build --target production --build-arg VITE_API_BASE_URL=/api/v1 -t docassist-frontend frontend/