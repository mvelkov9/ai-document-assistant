# ── TLS / HTTPS configuration template (OPTIONAL) ──
# This file is NOT used by default. It is a reference template
# for production HTTPS deployment IF you have your own domain.
# For the course demo, use default.conf (HTTP on port 80) instead.
#
# To use this template:
#   1. Replace YOURDOMAIN below with your actual domain
#   2. Obtain a certificate:
#        certbot certonly --standalone -d YOURDOMAIN
#   3. Mount the certificate directory into the proxy container:
#        volumes:
#          - /etc/letsencrypt:/etc/letsencrypt:ro
#   4. Expose port 443 in docker-compose.prod.yml:
#        ports:
#          - "443:443"
#          - "80:80"
#   5. Copy this file over default.conf

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name _;

    # ── Replace YOURDOMAIN with your actual domain name ──
    ssl_certificate     /etc/letsencrypt/live/YOURDOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOURDOMAIN/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── HSTS ──
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # ── Security headers ──
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Gzip compression ──
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # ── Proxy buffer tuning ──
    proxy_buffers 8 16k;
    proxy_buffer_size 32k;
    client_max_body_size 20m;

    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://backend:8000/health;
        proxy_set_header Host $host;
    }

    location /ready {
        proxy_pass http://backend:8000/ready;
        proxy_set_header Host $host;
    }

    location /docs {
        proxy_pass http://backend:8000/docs;
        proxy_set_header Host $host;
    }

    location /redoc {
        proxy_pass http://backend:8000/redoc;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://backend:8000/openapi.json;
        proxy_set_header Host $host;
    }

    # ── Vite HMR WebSocket (dev only) ──
    location /@vite/ {
        proxy_pass http://frontend:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://frontend:5173/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket support for Vite HMR
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
