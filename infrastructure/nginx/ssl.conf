# ── TLS / HTTPS configuration for doc-ai-assist.com ──

server {
    listen 80;
    server_name doc-ai-assist.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name doc-ai-assist.com;

    ssl_certificate     /etc/letsencrypt/live/doc-ai-assist.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/doc-ai-assist.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── HSTS ──
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # ── Security headers ──
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Gzip compression ──
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # ── Proxy buffer tuning ──
    proxy_buffers 8 16k;
    proxy_buffer_size 32k;
    client_max_body_size 20m;

    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://backend:8000/health;
        proxy_set_header Host $host;
    }

    location /ready {
        proxy_pass http://backend:8000/ready;
        proxy_set_header Host $host;
    }

    location /docs {
        proxy_pass http://backend:8000/docs;
        proxy_set_header Host $host;
    }

    location /redoc {
        proxy_pass http://backend:8000/redoc;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://backend:8000/openapi.json;
        proxy_set_header Host $host;
    }

    location /metrics {
        # Restrict to internal Docker network and localhost only
        allow 127.0.0.1;
        allow 172.16.0.0/12;
        allow 10.0.0.0/8;
        allow 192.168.0.0/16;
        deny all;
        proxy_pass http://backend:8000/metrics;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://frontend:5173/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
