services:
  proxy:
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/ssl.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend

  frontend:
    restart: unless-stopped
    build:
      context: ./frontend
      target: production
      args:
        VITE_API_BASE_URL: /api/v1

  backend:
    restart: unless-stopped
    ports: []
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5

  postgres:
    restart: unless-stopped
    ports: []
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 15s
      timeout: 5s
      retries: 10

  minio:
    restart: unless-stopped
    ports: []
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5

  prometheus:
    restart: unless-stopped
    ports: []

  grafana:
    restart: unless-stopped
    ports: []
